<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peter De Jesus Estrada ~ pedejesus2</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060810;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .os-wrap {
      width: 100%;
      max-width: 820px;
      background: #0d0f14;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #21262d;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .menubar {
      background: #161b22;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 7px 16px;
      font-size: 12px;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
    }
    .menubar .brand { color: #e6edf3; font-weight: 700; }

    .desktop { display: flex; min-height: 500px; }

    .sidebar {
      width: 58px;
      background: #0d1117;
      border-right: 1px solid #21262d;
      padding: 12px 0;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }

    .icon-btn {
      width: 38px; height: 38px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .main-area { flex: 1; padding: 16px; }

    .window {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .window-bar {
      background: #161b22;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 7px;
      border-bottom: 1px solid #21262d;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .window-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #8b949e;
    }

    .window-body { padding: 22px 26px; }

    .md-h1 { color: #58a6ff; font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .md-h2 { color: #3fb950; font-size: 12px; font-weight: 700; margin: 18px 0 10px; }

    .divider { border: none; border-top: 1px solid #21262d; margin: 12px 0; }

    .meta-row {
      display: flex; gap: 7px;
      font-size: 11px; color: #8b949e;
      margin-bottom: 6px; flex-wrap: wrap;
    }

    .badge {
      padding: 2px 9px;
      border-radius: 4px;
      font-size: 10px;
      border: 1px solid;
    }

    .badge.blue { background: #0d2044; border-color: #1f6feb; color: #58a6ff; }
    .badge.green { background: #0d2e12; border-color: #238636; color: #3fb950; }
    .badge.purple { background: #1f1235; border-color: #6e40c9; color: #bc8cff; }
    .badge.orange { background: #2e1a00; border-color: #e3b341; color: #e3b341; }
    .badge.teal { background: #0a2e2a; border-color: #1d6b5e; color: #39d353; }

    .skills-grid { display: flex; flex-wrap: wrap; gap: 5px; }

    .list-item {
      font-size: 11px;
      color: #c9d1d9;
      margin-bottom: 5px;
    }

    .list-item::before { content: "- "; color: #484f58; }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: #58a6ff;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .taskbar {
      background: #161b22;
      border-top: 1px solid #21262d;
      padding: 8px 16px;
      display: flex;
      justify-content: center;
    }

    .taskbar-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 11px;
      color: #8b949e;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="os-wrap">

  <div class="menubar">
    <span class="brand">ctOS</span>
  </div>

  <div class="desktop">

    <div class="sidebar">
      <a class="icon-btn" href="https://github.com/pedejesus2" target="_blank" title="GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#8b949e">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385..."/>
        </svg>
      </a>
    </div>

    <div class="main-area">
      <div class="window">
        <div class="window-bar">
          <div class="dot r"></div>
          <div class="dot y"></div>
          <div class="dot g"></div>
          <div class="window-title">about.md ~ Peter De Jesus</div>
        </div>

        <div class="window-body">
          <div class="md-h1"># ABOUT.md <span class="cursor"></span></div>
          <hr class="divider">

          <div class="md-h2">## Peter De Jesus</div>
          <div class="meta-row">
            <span class="badge blue">HelpDesk</span>
            <span class="badge purple">Guaynabo</span>
          </div>

          <div class="meta-row">
            <span class="badge orange">Aspiring SysAdmin / Cloud</span>
          </div>

          <hr class="divider">

          <div class="md-h2">## Skills</div>
          <div class="skills-grid">
            <span class="badge blue">Microsoft 365</span>
            <span class="badge orange">Active Directory</span>
            <span class="badge green">MFA</span>
            <span class="badge teal">Support</span>
          </div>

          <hr class="divider">

          <div class="md-h2">## Currently</div>
          <div class="list-item">WGU — Information Systems</div>
          <div class="list-item">CompTIA A+</div>
        </div>
      </div>
    </div>

  </div>

  <div class="taskbar">
    <a class="taskbar-btn" href="https://github.com/pedejesus2" target="_blank">
      pedejesus2
    </a>
  </div>

</div>

</body>
</html>
